<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudos — Novaiz Cristão (Em Breve)</title>
  
  <!-- SEO -->
  <meta name="robots" content="noindex, nofollow" />
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/style-cristao.css" />
  
  <style>
    /* Estilos específicos para a página de Em Breve */
    .coming-soon {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }

    .coming-soon__bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1920&q=80&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      filter: brightness(0.15) saturate(0.5);
      z-index: 0;
      animation: slowZoom 20s infinite alternate ease-in-out;
    }

    @keyframes slowZoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .coming-soon__overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, var(--color-bg) 90%);
      z-index: 1;
    }

    .coming-soon__content {
      position: relative;
      z-index: 2;
      max-width: 600px;
    }

    .coming-soon__badge {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: var(--color-gold-glow);
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 50px;
      color: var(--color-gold-light);
      font-family: var(--font-heading);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards 0.2s;
    }

    .coming-soon__title {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      margin-bottom: 1.5rem;
      letter-spacing: -0.03em;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s forwards 0.4s;
    }

    .coming-soon__title span {
      display: block;
      background: linear-gradient(90deg, var(--color-gold), var(--color-gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .coming-soon__description {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      margin-bottom: 3rem;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards 0.6s;
    }

    .coming-soon__actions {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards 0.8s;
    }

    /* Animação de brilho pulsante no título */
    .glow-text {
      text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
      animation: pulseGlow 3s infinite alternate;
    }

    @keyframes pulseGlow {
      from { text-shadow: 0 0 20px rgba(201, 168, 76, 0.2); }
      to { text-shadow: 0 0 40px rgba(201, 168, 76, 0.5); }
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Partículas de luz decorativas */
    .particle {
      position: absolute;
      background: var(--color-gold);
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
      z-index: 1;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
    }
  </style>
</head>
<body>

  <main class="coming-soon">
    <div class="coming-soon__bg"></div>
    <div class="coming-soon__overlay"></div>
    
    <!-- Partículas geradas via JS -->
    <div id="particles"></div>

    <div class="coming-soon__content">
      <div class="coming-soon__badge">Novaiz Cristão</div>
      
      <h1 class="coming-soon__title glow-text">
        EM <span>BREVE</span>
      </h1>
      
      <p class="coming-soon__description">
        Estamos preparando uma biblioteca completa de estudos bíblicos profundos e esboços de pregação para edificar sua jornada.
      </p>
      
      <div class="coming-soon__actions">
        <a href="/novaizcristao" class="btn btn-secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Voltar para o Início
        </a>
      </div>
    </div>
  </main>

  <script>
    /* Criar partículas de luz flutuantes */
    const particlesContainer = document.getElementById('particles');
    const particleCount = 15;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      const size = Math.random() * 4 + 2;
      const left = Math.random() * 100;
      const delay = Math.random() * 10;
      const duration = Math.random() * 10 + 10;
      
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${left}%`;
      particle.style.bottom = `-20px`;
      particle.style.animationDelay = `${delay}s`;
      particle.style.animationDuration = `${duration}s`;
      
      particlesContainer.appendChild(particle);
    }
  </script>

</body>
</html>
